{% if rows %}
  <div class="rounded-3xl border border-brand-100 bg-white p-5 shadow-sm mb-6">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-700 tracking-tight">{{ t('just_ready') }}</h2>
      <a href="/library" class="text-xs text-brand-600 font-700 hover:underline">{{ t('all_arrow') }}</a>
    </div>
    <ul class="space-y-2">
      {% for r in rows %}
        <li id="recent-row-{{ r.id }}" class="rounded-2xl border border-brand-100 bg-brand-50/40 px-3 py-2">
          <div class="flex items-center gap-3">
            <span class="flex-1 truncate text-sm font-700" title="{{ r.title or r.url }}">{{ r.title or r.url }}</span>
            <a href="/file/{{ r.id }}" class="text-brand-600 hover:underline text-xs" download title="{{ t('download_to_device') }}">↓</a>
          </div>
          <audio id="recent-audio-{{ r.id }}" controls preload="none" class="w-full mt-2 h-8" src="/file/{{ r.id }}"></audio>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endif %}
