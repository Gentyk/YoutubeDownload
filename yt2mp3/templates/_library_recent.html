{% if rows %}
  <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-semibold tracking-tight">Только что готово</h2>
      <a href="/library" class="text-xs text-brand-700 hover:underline">Все →</a>
    </div>
    <ul class="space-y-2">
      {% for r in rows %}
        <li class="rounded-xl border border-slate-200 px-3 py-2">
          <div class="flex items-center gap-3">
            <span class="flex-1 truncate text-sm font-medium" title="{{ r.title or r.url }}">
              {{ r.title or r.url }}
            </span>
            <a href="/file/{{ r.id }}" class="text-brand-700 hover:underline text-xs" download title="Скачать">↓</a>
          </div>
          <audio controls preload="none" class="w-full mt-2 h-8" src="/file/{{ r.id }}"></audio>
        </li>
      {% endfor %}
    </ul>
  </div>
{% endif %}
