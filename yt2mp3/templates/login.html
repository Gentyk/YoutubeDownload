{% extends "base.html" %}
{% block title %}yt2mp3 — {{ t('login_title') }}{% endblock %}

{% block content %}
<section class="max-w-sm mx-auto mt-12">
  <div class="rounded-3xl bg-white border border-brand-100 p-8 shadow-lg shadow-brand-500/10">
    <h1 class="text-2xl font-700 tracking-tight">{{ t('login_title') }} <span class="text-brand-600">yt2mp3</span></h1>

    {% if error %}
      <div class="mt-4 rounded-xl bg-coral/10 border border-coral/30 text-coral text-sm px-3 py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="mt-6 space-y-4">
      <input type="hidden" name="next" value="{{ next }}">
      <label class="block">
        <span class="text-xs font-700 text-ink/60 uppercase tracking-wide">{{ t('username') }}</span>
        <input type="text" name="username" required autofocus autocomplete="username"
          class="mt-1 block w-full rounded-xl border border-brand-200 bg-brand-50/40 px-3 py-2 text-sm focus-ring">
      </label>
      <label class="block">
        <span class="text-xs font-700 text-ink/60 uppercase tracking-wide">{{ t('password') }}</span>
        <input type="password" name="password" required autocomplete="current-password"
          class="mt-1 block w-full rounded-xl border border-brand-200 bg-brand-50/40 px-3 py-2 text-sm focus-ring">
      </label>
      <button type="submit"
        class="w-full rounded-full bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white font-800 px-6 py-2.5 transition focus-ring shadow-md shadow-brand-500/30">
        {{ t('sign_in') }}
      </button>
    </form>
  </div>
</section>
{% endblock %}
