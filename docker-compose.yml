services:
  yt2mp3:
    build: .
    container_name: yt2mp3
    restart: unless-stopped
    ports:
      # Bound globally — sets the page accessible at http://<server-ip>:8000.
      # Behind Caddy/nginx? Change to "127.0.0.1:8000:8000".
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      # Concurrency
      YT2MP3_MAX_CONCURRENT: "3"
      YT2MP3_MAX_QUEUE_SIZE: "50"
      # Login — set USER + PASS in .env to enable the login form.
      YT2MP3_AUTH_USER: "${YT2MP3_AUTH_USER:-}"
      YT2MP3_AUTH_PASS: "${YT2MP3_AUTH_PASS:-}"
      YT2MP3_SECRET_KEY: "${YT2MP3_SECRET_KEY:-}"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
